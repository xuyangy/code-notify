  </style>
  <text x="20" y="44" class="prompt">developer@mac code-notify % cn usage setup --watch</text>

  <text x="20" y="102" class="green">[OK] Usage reset alerts configured</text>
  <text x="20" y="138" class="blue">[i] Providers: all</text>
  <text x="20" y="174" class="blue">[i] Thresholds: 20%, 10%</text>
  <text x="20" y="210" class="blue">[i] Reset alerts: voice and distinct reset sound enabled</text>
  <text x="20" y="246" class="green">[OK] Usage watcher started (pid 84079, every 300s)</text>
