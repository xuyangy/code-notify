name: Windows Installation Test

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/install-windows.ps1'
      - '.github/workflows/windows-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/install-windows.ps1'
      - '.github/workflows/windows-test.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  test-windows-install:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Display PowerShell version
      run: |
        Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
        Write-Host "OS: $([System.Environment]::OSVersion.VersionString)"

    - name: Test install script syntax
      run: |
        $errors = $null
        $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Path "scripts/install-windows.ps1" -Raw), [ref]$errors)
        if ($errors.Count -gt 0) {
          Write-Host "Syntax errors found:" -ForegroundColor Red
          $errors | ForEach-Object { Write-Host "  Line $($_.Token.StartLine): $($_.Message)" -ForegroundColor Red }
          exit 1
        }
        Write-Host "Syntax check passed!" -ForegroundColor Green

    - name: Run installation
      run: |
        # Run installer in silent mode
        powershell -ExecutionPolicy Bypass -File scripts/install-windows.ps1 -Silent

    - name: Verify installation directories
      run: |
        $installDir = "$env:USERPROFILE\.code-notify"
        $claudeHome = "$env:USERPROFILE\.claude"

        # Check directories exist
        if (-not (Test-Path $installDir)) {
          Write-Host "ERROR: Install directory not created: $installDir" -ForegroundColor Red
          exit 1
        }
        Write-Host "OK: Install directory exists: $installDir" -ForegroundColor Green

        if (-not (Test-Path "$installDir\bin")) {
          Write-Host "ERROR: bin directory not created" -ForegroundColor Red
          exit 1
        }
        Write-Host "OK: bin directory exists" -ForegroundColor Green

        if (-not (Test-Path "$installDir\lib")) {
          Write-Host "ERROR: lib directory not created" -ForegroundColor Red
          exit 1
        }
        Write-Host "OK: lib directory exists" -ForegroundColor Green

        if (-not (Test-Path "$claudeHome\notifications")) {
          Write-Host "ERROR: notifications directory not created" -ForegroundColor Red
          exit 1
        }
        Write-Host "OK: notifications directory exists" -ForegroundColor Green

    - name: Verify installed files
      run: |
        $files = @(
          "$env:USERPROFILE\.code-notify\lib\CodeNotify.psm1",
          "$env:USERPROFILE\.code-notify\lib\ClaudeNotify.psm1",
          "$env:USERPROFILE\.code-notify\bin\code-notify.ps1",
          "$env:USERPROFILE\.code-notify\bin\cn.ps1",
          "$env:USERPROFILE\.code-notify\bin\cnp.ps1",
          "$env:USERPROFILE\.claude\notifications\notify.ps1"
        )

        foreach ($file in $files) {
          if (-not (Test-Path $file)) {
            Write-Host "ERROR: File not found: $file" -ForegroundColor Red
            exit 1
          }
          Write-Host "OK: File exists: $file" -ForegroundColor Green
        }

    - name: Test module import
      run: |
        Import-Module "$env:USERPROFILE\.code-notify\lib\CodeNotify.psm1" -Force

        # Check exported functions
        $functions = @('Invoke-CodeNotify', 'Invoke-ClaudeNotify', 'Send-Notification', 'Enable-Notifications', 'Disable-Notifications', 'Show-Status')
        foreach ($func in $functions) {
          if (-not (Get-Command $func -ErrorAction SilentlyContinue)) {
            Write-Host "ERROR: Function not exported: $func" -ForegroundColor Red
            exit 1
          }
          Write-Host "OK: Function exported: $func" -ForegroundColor Green
        }

    - name: Test CLI commands (help)
      run: |
        & "$env:USERPROFILE\.code-notify\bin\cn.ps1" help

    - name: Test CLI commands (version)
      run: |
        & "$env:USERPROFILE\.code-notify\bin\cn.ps1" version

    - name: Test CLI commands (version shortcut)
      run: |
        $versionOutput = & "$env:USERPROFILE\.code-notify\bin\cn.ps1" -v | Out-String
        Write-Host $versionOutput

        if ($versionOutput -match 'VERBOSE:') {
          Write-Host "ERROR: cn -v leaked PowerShell verbose import output" -ForegroundColor Red
          exit 1
        }

        if ($versionOutput -notmatch 'code-notify version') {
          Write-Host "ERROR: cn -v did not resolve to the version command" -ForegroundColor Red
          exit 1
        }

    - name: Test CLI commands (status)
      run: |
        & "$env:USERPROFILE\.code-notify\bin\cn.ps1" status

    - name: Test update check command
      run: |
        $currentVersion = ((& "$env:USERPROFILE\.code-notify\bin\cn.ps1" version | Out-String).Trim() -replace '^.*version\s+', '')
        $env:CODE_NOTIFY_LATEST_VERSION = $currentVersion
        $updateOutput = & "$env:USERPROFILE\.code-notify\bin\cn.ps1" update check | Out-String
        Write-Host $updateOutput

        if ($updateOutput -notmatch 'Code-Notify is up to date') {
          Write-Host "ERROR: update check did not report the install as current" -ForegroundColor Red
          exit 1
        }

        if ($updateOutput -notmatch 'install-windows\.ps1') {
          Write-Host "ERROR: update check did not point to the Windows installer" -ForegroundColor Red
          exit 1
        }

    - name: Test no-op update command
      run: |
        $currentVersion = ((& "$env:USERPROFILE\.code-notify\bin\cn.ps1" version | Out-String).Trim() -replace '^.*version\s+', '')
        $env:CODE_NOTIFY_LATEST_VERSION = $currentVersion
        $updateOutput = & "$env:USERPROFILE\.code-notify\bin\cn.ps1" update | Out-String
        Write-Host $updateOutput

        if ($updateOutput -notmatch 'Code-Notify is up to date') {
          Write-Host "ERROR: update command did not skip reinstalling the current version" -ForegroundColor Red
          exit 1
        }

    - name: Verify notifier uses explicit sound playback
      run: |
        $notifyScript = "$env:USERPROFILE\.claude\notifications\notify.ps1"
        $notifyContent = Get-Content $notifyScript -Raw

        if ($notifyContent -match 'Notification\.Default') {
          Write-Host "ERROR: notify.ps1 still requests the default toast sound" -ForegroundColor Red
          exit 1
        }

        if ($notifyContent -notmatch '<audio silent="true"/>') {
          Write-Host "ERROR: notify.ps1 is not explicitly silent" -ForegroundColor Red
          exit 1
        }

        Write-Host "OK: notify.ps1 keeps toast audio silent and uses explicit sound playback" -ForegroundColor Green

    - name: Test enable/disable notifications
      run: |
        # Enable
        & "$env:USERPROFILE\.code-notify\bin\cn.ps1" on all

        # Check settings.json was created with hooks
        $settingsFile = "$env:USERPROFILE\.claude\settings.json"
        if (-not (Test-Path $settingsFile)) {
          Write-Host "ERROR: settings.json not created" -ForegroundColor Red
          exit 1
        }

        $settings = Get-Content $settingsFile -Raw | ConvertFrom-Json
        if (-not $settings.hooks) {
          Write-Host "ERROR: hooks not added to settings" -ForegroundColor Red
          exit 1
        }
        Write-Host "OK: Notifications enabled, hooks configured" -ForegroundColor Green

        # Disable
        & "$env:USERPROFILE\.code-notify\bin\cn.ps1" off all

        if (Test-Path $settingsFile) {
          $settings = Get-Content $settingsFile -Raw | ConvertFrom-Json
          if ($settings.hooks) {
            Write-Host "ERROR: hooks not removed from settings" -ForegroundColor Red
            exit 1
          }
        }
        Write-Host "OK: Notifications disabled, hooks removed" -ForegroundColor Green

    - name: Test tool-specific commands
      run: |
        & "$env:USERPROFILE\.code-notify\bin\cn.ps1" on codex

        $codexHooks = "$env:USERPROFILE\.codex\hooks.json"
        if (-not (Test-Path $codexHooks)) {
          Write-Host "ERROR: Codex hooks.json not created" -ForegroundColor Red
          exit 1
        }

        $codexContent = Get-Content $codexHooks -Raw
        if ($codexContent -notmatch '"Stop"' -or $codexContent -notmatch 'stop codex') {
          Write-Host "ERROR: Codex lifecycle hook not added" -ForegroundColor Red
          exit 1
        }
        Write-Host "OK: Codex notifications enabled" -ForegroundColor Green

        & "$env:USERPROFILE\.code-notify\bin\cn.ps1" off codex

        $codexContent = Get-Content $codexHooks -Raw
        if ($codexContent -match '(stop|notification) codex') {
          Write-Host "ERROR: Codex lifecycle hook not removed" -ForegroundColor Red
          exit 1
        }
        Write-Host "OK: Codex notifications disabled" -ForegroundColor Green

    - name: Test project commands
      run: |
        # Create a test project directory
        $testProject = "$env:TEMP\test-claude-project"
        New-Item -ItemType Directory -Path $testProject -Force | Out-Null
        Set-Location $testProject

        # Initialize git repo (for project detection)
        git init
        git config user.email "test@test.com"
        git config user.name "Test"

        $trustConfig = @{
          projects = @{
            $testProject = @{
              hasTrustDialogAccepted = $false
            }
          }
        }
        $trustConfig | ConvertTo-Json -Depth 10 | Set-Content "$env:USERPROFILE\.claude.json" -Encoding UTF8

        # Enable project notifications
        $projectOutput = & "$env:USERPROFILE\.code-notify\bin\cnp.ps1" on | Out-String
        Write-Host $projectOutput

        if ($projectOutput -notmatch 'trust does not appear to be accepted') {
          Write-Host "ERROR: Project trust warning was not shown" -ForegroundColor Red
          exit 1
        }

        # Check project settings created
        if (-not (Test-Path "$testProject\.claude\settings.json")) {
          Write-Host "ERROR: Project settings.json not created" -ForegroundColor Red
          exit 1
        }
        Write-Host "OK: Project notifications enabled" -ForegroundColor Green

        # Check status
        & "$env:USERPROFILE\.code-notify\bin\cnp.ps1" status

        # Disable
        & "$env:USERPROFILE\.code-notify\bin\cnp.ps1" off
        Write-Host "OK: Project notifications disabled" -ForegroundColor Green

    - name: Test notification script
      run: |
        # Test the notification script directly (won't show UI in CI but should run without error)
        & "$env:USERPROFILE\.claude\notifications\notify.ps1" "test" 2>&1
        Write-Host "OK: Notification script executed" -ForegroundColor Green

    - name: Test uninstall
      run: |
        powershell -ExecutionPolicy Bypass -File scripts/install-windows.ps1 -Uninstall

        if (Test-Path "$env:USERPROFILE\.code-notify") {
          Write-Host "ERROR: Install directory not removed" -ForegroundColor Red
          exit 1
        }
        Write-Host "OK: Uninstall completed successfully" -ForegroundColor Green

    - name: Summary
      run: |
        Write-Host ""
        Write-Host "========================================" -ForegroundColor Green
        Write-Host "  All Windows installation tests passed!" -ForegroundColor Green
        Write-Host "========================================" -ForegroundColor Green

  test-windows-2022:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Display system info
      run: |
        Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
        Write-Host "OS: $([System.Environment]::OSVersion.VersionString)"

    - name: Run installation
      run: |
        powershell -ExecutionPolicy Bypass -File scripts/install-windows.ps1 -Silent

    - name: Basic functionality test
      run: |
        & "$env:USERPROFILE\.code-notify\bin\cn.ps1" version
        & "$env:USERPROFILE\.code-notify\bin\cn.ps1" status
        Write-Host "OK: Basic functionality works on Windows Server 2022" -ForegroundColor Green
