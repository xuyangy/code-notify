name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify release version
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          cli_version="$(bash bin/code-notify version | awk '{print $3}')"
          tag="${{ github.event.release.tag_name }}"

          if [[ "$tag" != "v$package_version" ]]; then
            echo "Release tag $tag does not match package version $package_version"
            exit 1
          fi

          if [[ "$cli_version" != "$package_version" ]]; then
            echo "CLI version $cli_version does not match package version $package_version"
            exit 1
          fi

      - name: Run tests
        run: bash scripts/run_tests.sh

      - name: Check npm package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
