<svg width="1166" height="624" viewBox="0 0 1166 624" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1166" height="624" rx="18" fill="#101114"/>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 27px; font-weight: 700; }
    .prompt { fill: #f4f4f5; }
    .green { fill: #39e75f; }
    .blue { fill: #7c6cff; }
    .cyan { fill: #45d7ff; }
