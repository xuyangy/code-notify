name: macOS Installation Test

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/install.sh'
      - 'bin/**'
      - 'lib/**'
      - '.github/workflows/macos-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/install.sh'
      - 'bin/**'
      - 'lib/**'
      - '.github/workflows/macos-test.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  test-macos-install:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Display system info
      run: |
        echo "macOS Version: $(sw_vers -productVersion)"
        echo "Shell: $SHELL"
        echo "Bash Version: $(bash --version | head -1)"

    - name: Install jq dependency
      run: |
        brew install jq
        echo "jq version: $(jq --version)"

    - name: Test install.sh syntax
      run: |
        bash -n scripts/install.sh
        echo "Syntax check passed!"

    - name: Test main script syntax
      run: |
        bash -n bin/code-notify
        echo "Main script syntax OK"

    - name: Test lib scripts syntax
      run: |
        for file in lib/code-notify/**/*.sh; do
          echo "Checking: $file"
          bash -n "$file"
        done
        echo "All lib scripts syntax OK"

    - name: Run installation
      run: |
        chmod +x scripts/install.sh
        ./scripts/install.sh

    - name: Verify installation directories
      run: |
        INSTALL_DIR="$HOME/.code-notify"

        if [[ ! -d "$INSTALL_DIR" ]]; then
          echo "ERROR: Install directory not created: $INSTALL_DIR"
          exit 1
        fi
        echo "OK: Install directory exists: $INSTALL_DIR"

        if [[ ! -d "$INSTALL_DIR/bin" ]]; then
          echo "ERROR: bin directory not created"
          exit 1
        fi
        echo "OK: bin directory exists"

        if [[ ! -d "$INSTALL_DIR/lib" ]]; then
          echo "ERROR: lib directory not created"
          exit 1
        fi
        echo "OK: lib directory exists"

        if [[ ! -d "$HOME/.claude/notifications" ]]; then
          echo "ERROR: notifications directory not created"
          exit 1
        fi
        echo "OK: notifications directory exists"

    - name: Verify installed files
      run: |
        FILES=(
          "$HOME/.code-notify/bin/code-notify"
          "$HOME/.code-notify/lib/code-notify/core/config.sh"
          "$HOME/.code-notify/lib/code-notify/core/notifier.sh"
          "$HOME/.code-notify/lib/code-notify/commands/global.sh"
          "$HOME/.code-notify/lib/code-notify/commands/project.sh"
          "$HOME/.code-notify/lib/code-notify/utils/colors.sh"
          "$HOME/.code-notify/lib/code-notify/utils/detect.sh"
          "$HOME/.code-notify/lib/code-notify/utils/help.sh"                                   
          "$HOME/.code-notify/lib/code-notify/utils/voice.sh"  
        )

        for file in "${FILES[@]}"; do
          if [[ ! -f "$file" ]]; then
            echo "ERROR: File not found: $file"
            exit 1
          fi
          echo "OK: File exists: $file"
        done

    - name: Verify symlinks
      run: |
        BIN_DIR="$HOME/.local/bin"

        if [[ ! -L "$BIN_DIR/code-notify" ]]; then
          echo "ERROR: code-notify symlink not created"
          exit 1
        fi
        echo "OK: code-notify symlink exists"

        if [[ ! -L "$BIN_DIR/cn" ]]; then
          echo "ERROR: cn symlink not created"
          exit 1
        fi
        echo "OK: cn symlink exists"

        if [[ ! -L "$BIN_DIR/cnp" ]]; then
          echo "ERROR: cnp symlink not created"
          exit 1
        fi
        echo "OK: cnp symlink exists"

    - name: Add to PATH and test CLI
      run: |
        export PATH="$HOME/.local/bin:$PATH"

        # Test help
        code-notify help

        # Test version
        code-notify version

    - name: Test CLI aliases
      run: |
        export PATH="$HOME/.local/bin:$PATH"

        # Test cn alias
        cn version
        cn help

        # Test status
        cn status

    - name: Test update check command
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        CURRENT_VERSION="$(cn version | awk '{print $3}')"
        UPDATE_OUTPUT="$(CODE_NOTIFY_LATEST_VERSION="$CURRENT_VERSION" cn update check)"
        echo "$UPDATE_OUTPUT"

        if ! echo "$UPDATE_OUTPUT" | grep -q 'Code-Notify is up to date'; then
          echo "ERROR: update check did not report the install as current"
          exit 1
        fi

        if ! echo "$UPDATE_OUTPUT" | grep -q 'scripts/install.sh'; then
          echo "ERROR: update check did not point to the install script"
          exit 1
        fi

    - name: Test no-op update command
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        CURRENT_VERSION="$(cn version | awk '{print $3}')"
        UPDATE_OUTPUT="$(CODE_NOTIFY_LATEST_VERSION="$CURRENT_VERSION" cn update)"
        echo "$UPDATE_OUTPUT"

        if ! echo "$UPDATE_OUTPUT" | grep -q 'Code-Notify is up to date'; then
          echo "ERROR: update command did not skip reinstalling the current version"
          exit 1
        fi

    - name: Test macOS notifier sound path
      run: |
        bash tests/test-notifier-sound.sh

    - name: Test enable/disable notifications
      run: |
        export PATH="$HOME/.local/bin:$PATH"

        # Enable
        cn on all

        # Check settings.json was created with hooks
        SETTINGS_FILE="$HOME/.claude/settings.json"
        if [[ ! -f "$SETTINGS_FILE" ]]; then
          echo "ERROR: settings.json not created"
          exit 1
        fi

        if ! jq -e '.hooks' "$SETTINGS_FILE" > /dev/null; then
          echo "ERROR: hooks not added to settings"
          exit 1
        fi
        echo "OK: Notifications enabled, hooks configured"

        # Disable
        cn off all

        if jq -e '.hooks' "$SETTINGS_FILE" > /dev/null 2>&1; then
          echo "ERROR: hooks not removed from settings"
          exit 1
        fi
        echo "OK: Notifications disabled, hooks removed"

    - name: Test project commands
      run: |
        export PATH="$HOME/.local/bin:$PATH"

        # Create a test project directory
        TEST_PROJECT="/tmp/test-claude-project"
        mkdir -p "$TEST_PROJECT"
        cd "$TEST_PROJECT"

        # Initialize git repo (for project detection)
        git init
        git config user.email "test@test.com"
        git config user.name "Test"
        PROJECT_ROOT="$(git rev-parse --show-toplevel)"

        cat > "$HOME/.claude.json" <<EOF
        {
          "projects": {
            "$PROJECT_ROOT": {
              "hasTrustDialogAccepted": false
            }
          }
        }
        EOF

        # Enable project notifications
        PROJECT_OUTPUT="$(cnp on)"
        echo "$PROJECT_OUTPUT"

        if ! echo "$PROJECT_OUTPUT" | grep -q 'trust does not appear to be accepted'; then
          echo "ERROR: Project trust warning was not shown"
          exit 1
        fi

        # Check project settings created
        if [[ ! -f "$TEST_PROJECT/.claude/settings.json" ]]; then
          echo "ERROR: Project settings.json not created"
          exit 1
        fi
        echo "OK: Project notifications enabled"

        # Check status
        cnp status

        # Disable
        cnp off
        echo "OK: Project notifications disabled"

    - name: Test notifier script
      run: |
        # Test the notification script directly (may not show UI in CI)
        NOTIFIER="$HOME/.code-notify/lib/code-notify/core/notifier.sh"
        if [[ -f "$NOTIFIER" ]]; then
          chmod +x "$NOTIFIER"
          "$NOTIFIER" test 2>&1 || true
          echo "OK: Notifier script executed"
        fi

    - name: Summary
      run: |
        echo ""
        echo "========================================"
        echo "  All macOS installation tests passed!"
        echo "========================================"

  test-direct-execution:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Test direct script execution
      run: |
        # Test running directly without installation
        chmod +x bin/code-notify

        # Export required paths
        export PATH="$PWD/bin:$PATH"

        # This should show help (may fail if deps not met, which is OK)
        bin/code-notify help || echo "Direct execution test complete"
